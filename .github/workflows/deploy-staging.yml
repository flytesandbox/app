name: Deploy Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Build, publish, and deploy to staging
    runs-on: ubuntu-latest
    environment: staging

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ${{ vars.REGISTRY }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      IMAGE_TAG: ${{ github.sha }}
      STAGING_DEPLOY_PATH: ${{ vars.STAGING_DEPLOY_PATH }}
      STAGING_WEB_HOST: ${{ vars.STAGING_WEB_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node for repo guardrail checks
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Check environment boundary guardrails
        run: node web/scripts/check-env-boundaries.mjs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Validate image naming inputs
        env:
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          set -Eeuo pipefail

          if [ -z "${REGISTRY:-}" ]; then
            echo "Missing GitHub variable: REGISTRY"
            exit 1
          fi

          if [ -z "${IMAGE_NAME:-}" ]; then
            echo "Missing GitHub variable: IMAGE_NAME"
            exit 1
          fi

          echo "FULL_IMAGE_NAME=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "Using image: ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Validate staging DB mode and URLs
        env:
          APP_ENV: ${{ vars.APP_ENV }}
          DATABASE_ENABLED: ${{ vars.DATABASE_ENABLED }}
          DB_SSL_REQUIRED: ${{ vars.DB_SSL_REQUIRED }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          STAGING_DATABASE_MIGRATION_URL: ${{ secrets.STAGING_DATABASE_MIGRATION_URL }}
        run: |
          python - <<'PY'
          import os
          import posixpath
          from urllib.parse import urlparse

          LOCAL_HOSTS = {"127.0.0.1", "localhost", "::1", "0.0.0.0", "0.0.0.1", "host.docker.internal"}

          def parse_bool(name: str) -> bool:
              value = os.environ.get(name, "").strip().lower()
              if value in {"1", "true", "yes", "on"}:
                  return True
              if value in {"0", "false", "no", "off"}:
                  return False
              raise SystemExit(
                  f"GitHub staging variable {name} must be one of: 1, true, yes, on, 0, false, no, off"
              )

          def validate_mysql_url(name: str) -> None:
              value = os.environ.get(name, "").strip()
              if not value:
                  raise SystemExit(
                      f"GitHub staging secret {name} is required when DATABASE_ENABLED=true"
                  )

              parsed = urlparse(value)
              if parsed.scheme != "mysql":
                  raise SystemExit(f"GitHub staging secret {name} must use mysql://")
              if not parsed.hostname:
                  raise SystemExit(f"GitHub staging secret {name} must include a hostname")
              if parsed.hostname in LOCAL_HOSTS:
                  raise SystemExit(
                      f"GitHub staging secret {name} must not use a local-only hostname"
                  )
              if parsed.path in {"", "/"}:
                  raise SystemExit(f"GitHub staging secret {name} must include a database name")
              if parsed.path.lstrip("/") != "app_staging":
                  raise SystemExit(
                      f"GitHub staging secret {name} must target the app_staging database"
                  )

          if os.environ.get("APP_ENV", "").strip() != "staging":
              raise SystemExit("GitHub staging variable APP_ENV must equal staging")

          if parse_bool("DATABASE_ENABLED"):
              if not parse_bool("DB_SSL_REQUIRED"):
                  raise SystemExit(
                      "GitHub staging variable DB_SSL_REQUIRED must be true when DATABASE_ENABLED=true"
                  )
              validate_mysql_url("STAGING_DATABASE_URL")
              validate_mysql_url("STAGING_DATABASE_MIGRATION_URL")
              print("DATABASE_ENABLED=true; staging DB URLs validated.")
          else:
              print("DATABASE_ENABLED=false; skipping staging DB URL validation.")
          PY

      - name: Validate staging app auth/runtime contract
        env:
          APP_ENV: ${{ vars.APP_ENV }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          CLERK_AUTHORIZED_PARTIES: ${{ vars.CLERK_AUTHORIZED_PARTIES }}
          STAGING_DEPLOY_PATH: ${{ vars.STAGING_DEPLOY_PATH }}
          STAGING_WEB_HOST: ${{ vars.STAGING_WEB_HOST }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY }}
        run: |
          python - <<'PY'
          import os
          import posixpath
          from urllib.parse import urlparse

          LOCAL_HOSTS = {"127.0.0.1", "localhost", "::1", "0.0.0.0", "0.0.0.1", "host.docker.internal"}

          def require(name: str) -> str:
              value = os.environ.get(name, "").strip()
              if not value:
                  raise SystemExit(f"GitHub staging setting {name} is required")
              return value

          def reject_wrapping_quotes(name: str, value: str) -> None:
              if len(value) >= 2 and value[0] == value[-1] and value[0] in {"'", '"'}:
                  raise SystemExit(
                      f"GitHub staging setting {name} must be stored without wrapping quotes. Paste the raw value only."
                  )

          def validate_http_url(name: str, value: str) -> str:
              reject_wrapping_quotes(name, value)
              parsed = urlparse(value)
              if parsed.scheme not in {"http", "https"}:
                  raise SystemExit(f"GitHub staging setting {name} must use http:// or https://")
              if not parsed.netloc:
                  raise SystemExit(f"GitHub staging setting {name} must include a hostname")
              return value

          def validate_absolute_path(name: str, value: str) -> str:
              reject_wrapping_quotes(name, value)
              if not value.startswith("/"):
                  raise SystemExit(f"GitHub staging setting {name} must be an absolute path")

              normalized = posixpath.normpath(value)
              if normalized != value:
                  raise SystemExit(
                      f"GitHub staging setting {name} must be stored as the canonical path without trailing slashes or dot segments; use {normalized}"
                  )

              return value

          def validate_staging_origin(name: str, value: str, expected_host: str) -> str:
              parsed = urlparse(validate_http_url(name, value))
              if parsed.scheme != "https":
                  raise SystemExit(
                      f"GitHub staging setting {name} must use https:// for staging"
                  )
              if parsed.hostname != expected_host:
                  raise SystemExit(
                      f"GitHub staging setting {name} must use host {expected_host}"
                  )
              if parsed.hostname in LOCAL_HOSTS:
                  raise SystemExit(
                      f"GitHub staging setting {name} must not use a local-only hostname"
                  )
              if parsed.path not in {"", "/"}:
                  raise SystemExit(
                      f"GitHub staging setting {name} must be an origin only and not include a path"
                  )
              if parsed.params or parsed.query or parsed.fragment:
                  raise SystemExit(
                      f"GitHub staging setting {name} must not include params, query strings, or fragments"
                  )
              return value

          def validate_clerk_key(name: str, value: str, prefixes: tuple[str, ...]) -> str:
              reject_wrapping_quotes(name, value)
              if not value.startswith(prefixes):
                  prefix_list = " or ".join(prefixes)
                  raise SystemExit(
                      f"GitHub staging setting {name} must start with {prefix_list}. Copy the real value from the staging Clerk app and store it without quotes."
                  )
              return value

          def clerk_key_family(name: str, value: str) -> str:
              if "_test_" in value:
                  return "test"
              if "_live_" in value:
                  return "live"
              raise SystemExit(
                  f"GitHub staging setting {name} is not a recognizable Clerk key"
              )

          if require("APP_ENV") != "staging":
              raise SystemExit("GitHub staging setting APP_ENV must equal staging")

          staging_deploy_path = validate_absolute_path(
              "STAGING_DEPLOY_PATH",
              require("STAGING_DEPLOY_PATH"),
          )
          if staging_deploy_path != "/app/staging":
              raise SystemExit(
                  f"GitHub staging setting STAGING_DEPLOY_PATH must equal /app/staging; found {staging_deploy_path}"
              )

          staging_web_host = require("STAGING_WEB_HOST")
          if staging_web_host != "staging.mecplans101.com":
              raise SystemExit(
                  "GitHub staging setting STAGING_WEB_HOST must equal staging.mecplans101.com"
              )

          app_url = validate_staging_origin(
              "NEXT_PUBLIC_APP_URL",
              require("NEXT_PUBLIC_APP_URL"),
              staging_web_host,
          )
          authorized_parties = require("CLERK_AUTHORIZED_PARTIES")

          seen_required_origin = False
          seen_any_authorized_party = False
          for raw_part in authorized_parties.split(","):
              part = raw_part.strip()
              if not part:
                  continue
              seen_any_authorized_party = True
              validate_staging_origin("CLERK_AUTHORIZED_PARTIES", part, staging_web_host)
              if part == app_url:
                  seen_required_origin = True

          if not seen_any_authorized_party:
              raise SystemExit(
                  "GitHub staging setting CLERK_AUTHORIZED_PARTIES must contain at least one origin"
              )

          if not seen_required_origin:
              raise SystemExit(
                  "GitHub staging setting CLERK_AUTHORIZED_PARTIES must include NEXT_PUBLIC_APP_URL"
              )

          publishable_key = validate_clerk_key(
              "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY",
              require("NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"),
              ("pk_test_", "pk_live_"),
          )
          secret_key = validate_clerk_key(
              "CLERK_SECRET_KEY",
              require("CLERK_SECRET_KEY"),
              ("sk_test_", "sk_live_"),
          )

          if clerk_key_family("NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY", publishable_key) != clerk_key_family(
              "CLERK_SECRET_KEY", secret_key
          ):
              raise SystemExit(
                  "GitHub staging settings NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY and CLERK_SECRET_KEY must both be test keys or both be live keys. Copy both values from the same staging Clerk app."
              )

          jwt_key = require("CLERK_JWT_KEY").replace("\\n", "\n")
          if "BEGIN PUBLIC KEY" not in jwt_key:
              raise SystemExit(
                  "GitHub staging setting CLERK_JWT_KEY must contain a PEM public key. Copy the full Clerk JWT public key including the BEGIN/END lines."
              )

          print("Staging auth/runtime values validated.")
          PY
      
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ env.FULL_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Generate staging runtime env, compose env, and release metadata
        env:
          APP_ENV: ${{ vars.APP_ENV }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${{ vars.NEXT_PUBLIC_CLERK_SIGN_IN_URL }}
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${{ vars.NEXT_PUBLIC_CLERK_SIGN_UP_URL }}
          NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL: ${{ vars.NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL }}
          NEXT_PUBLIC_CLERK_SIGN_UP_FORCE_REDIRECT_URL: ${{ vars.NEXT_PUBLIC_CLERK_SIGN_UP_FORCE_REDIRECT_URL }}
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: ${{ vars.NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL }}
          NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: ${{ vars.NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL }}
          CLERK_AUTHORIZED_PARTIES: ${{ vars.CLERK_AUTHORIZED_PARTIES }}
          DATABASE_ENABLED: ${{ vars.DATABASE_ENABLED }}
          DB_SSL_REQUIRED: ${{ vars.DB_SSL_REQUIRED }}
          DB_POOL_LIMIT: ${{ vars.DB_POOL_LIMIT }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          STAGING_DATABASE_MIGRATION_URL: ${{ secrets.STAGING_DATABASE_MIGRATION_URL }}
        run: |
          mkdir -p .deploy/staging

          python - <<'PY'
          import os
          from pathlib import Path
          from datetime import datetime, timezone

          deploy_dir = Path(".deploy/staging")
          deploy_dir.mkdir(parents=True, exist_ok=True)

          release_env = {
              "RELEASE_GIT_SHA": os.environ["GITHUB_SHA"],
              "RELEASE_IMAGE_TAG": os.environ["IMAGE_TAG"],
              "RELEASE_DEPLOYED_AT": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "RELEASE_PREVIOUS_GOOD_TAG": "unknown",
          }

          runtime_env = {
              "APP_ENV": os.environ["APP_ENV"],
              "NEXT_PUBLIC_APP_URL": os.environ["NEXT_PUBLIC_APP_URL"],
              "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY": os.environ["NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"],
              "NEXT_PUBLIC_CLERK_SIGN_IN_URL": os.environ["NEXT_PUBLIC_CLERK_SIGN_IN_URL"],
              "NEXT_PUBLIC_CLERK_SIGN_UP_URL": os.environ["NEXT_PUBLIC_CLERK_SIGN_UP_URL"],
              "NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL": os.environ["NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL"],
              "NEXT_PUBLIC_CLERK_SIGN_UP_FORCE_REDIRECT_URL": os.environ["NEXT_PUBLIC_CLERK_SIGN_UP_FORCE_REDIRECT_URL"],
              "NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL": os.environ["NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL"],
              "NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL": os.environ["NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL"],
              "CLERK_SECRET_KEY": os.environ["CLERK_SECRET_KEY"],
              "CLERK_JWT_KEY": os.environ["CLERK_JWT_KEY"],
              "CLERK_AUTHORIZED_PARTIES": os.environ["CLERK_AUTHORIZED_PARTIES"],
              "DATABASE_ENABLED": os.environ["DATABASE_ENABLED"],
              "DATABASE_URL": os.environ["STAGING_DATABASE_URL"],
              "DATABASE_MIGRATION_URL": os.environ["STAGING_DATABASE_MIGRATION_URL"],
              "DB_SSL_REQUIRED": os.environ["DB_SSL_REQUIRED"],
              "DB_POOL_LIMIT": os.environ["DB_POOL_LIMIT"],
              "IMAGE_NAME": os.environ["FULL_IMAGE_NAME"],
              **release_env,
          }

          compose_env = {
              "IMAGE_NAME": os.environ["FULL_IMAGE_NAME"],
              "IMAGE_TAG": os.environ["IMAGE_TAG"],
              "EDGE_NETWORK": "edge",
              "STAGING_WEB_HOST": os.environ["STAGING_WEB_HOST"],
              "APP_INTERNAL_PORT": "3000",
              "APP_RUNTIME_ENV_FILE": ".env",
          }

          def normalize_env_value(value: str) -> str:
              return value.replace("\r\n", "\n").replace("\r", "\n").replace("\n", "\\n")

          def write_env_file(path: Path, data: dict[str, str]) -> None:
              lines = []
              for key, value in data.items():
                  lines.append(f"{key}={normalize_env_value(value)}")
              path.write_text("\n".join(lines) + "\n", encoding="utf-8")

          write_env_file(deploy_dir / ".env", runtime_env)
          write_env_file(deploy_dir / "compose.env", compose_env)
          write_env_file(deploy_dir / "release.env", release_env)
          PY

      - name: Prepare SSH
        env:
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          STAGING_SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$STAGING_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$STAGING_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Ensure remote deploy path exists
        env:
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$STAGING_SSH_PORT" \
            "$STAGING_SSH_USER@$STAGING_SSH_HOST" \
            "mkdir -p '$STAGING_DEPLOY_PATH'"

      - name: Copy deploy scripts, compose, and env files to server
        env:
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          scp -i ~/.ssh/id_ed25519 -P "$STAGING_SSH_PORT" \
            infra/scripts/deploy_remote.sh \
            "$STAGING_SSH_USER@$STAGING_SSH_HOST:$STAGING_DEPLOY_PATH/deploy_remote.sh"

          scp -i ~/.ssh/id_ed25519 -P "$STAGING_SSH_PORT" \
            infra/scripts/rollback_remote.sh \
            "$STAGING_SSH_USER@$STAGING_SSH_HOST:$STAGING_DEPLOY_PATH/rollback_remote.sh"

          scp -i ~/.ssh/id_ed25519 -P "$STAGING_SSH_PORT" \
            infra/compose/staging/compose.yml \
            "$STAGING_SSH_USER@$STAGING_SSH_HOST:$STAGING_DEPLOY_PATH/compose.yml"

          scp -i ~/.ssh/id_ed25519 -P "$STAGING_SSH_PORT" \
            .deploy/staging/.env \
            "$STAGING_SSH_USER@$STAGING_SSH_HOST:$STAGING_DEPLOY_PATH/.env"

          scp -i ~/.ssh/id_ed25519 -P "$STAGING_SSH_PORT" \
            .deploy/staging/compose.env \
            "$STAGING_SSH_USER@$STAGING_SSH_HOST:$STAGING_DEPLOY_PATH/compose.env"

          scp -i ~/.ssh/id_ed25519 -P "$STAGING_SSH_PORT" \
            .deploy/staging/release.env \
            "$STAGING_SSH_USER@$STAGING_SSH_HOST:$STAGING_DEPLOY_PATH/release.env"

      - name: Run remote deploy
        env:
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
          STAGING_PROBE_SCHEME: ${{ vars.STAGING_PROBE_SCHEME }}
          STAGING_PROBE_PORT: ${{ vars.STAGING_PROBE_PORT }}
          STAGING_PROBE_IP: ${{ vars.STAGING_PROBE_IP }}
          STAGING_PROBE_CONNECT_TIMEOUT: ${{ vars.STAGING_PROBE_CONNECT_TIMEOUT }}
          STAGING_PROBE_MAX_TIME: ${{ vars.STAGING_PROBE_MAX_TIME }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$STAGING_SSH_PORT" \
            "$STAGING_SSH_USER@$STAGING_SSH_HOST" <<EOF
          set -Eeuo pipefail
          export GHCR_USERNAME='${{ github.actor }}'
          export GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}'
          export APP_ROOT='${{ vars.STAGING_DEPLOY_PATH }}'
          unset PROBE_SCHEME PROBE_PORT PROBE_IP PROBE_CONNECT_TIMEOUT PROBE_MAX_TIME
          [ -n "${STAGING_PROBE_SCHEME:-}" ] && export PROBE_SCHEME="$STAGING_PROBE_SCHEME"
          [ -n "${STAGING_PROBE_PORT:-}" ] && export PROBE_PORT="$STAGING_PROBE_PORT"
          [ -n "${STAGING_PROBE_IP:-}" ] && export PROBE_IP="$STAGING_PROBE_IP"
          [ -n "${STAGING_PROBE_CONNECT_TIMEOUT:-}" ] && export PROBE_CONNECT_TIMEOUT="$STAGING_PROBE_CONNECT_TIMEOUT"
          [ -n "${STAGING_PROBE_MAX_TIME:-}" ] && export PROBE_MAX_TIME="$STAGING_PROBE_MAX_TIME"
          chmod +x '${{ vars.STAGING_DEPLOY_PATH }}/deploy_remote.sh' '${{ vars.STAGING_DEPLOY_PATH }}/rollback_remote.sh'
          bash '${{ vars.STAGING_DEPLOY_PATH }}/deploy_remote.sh' '${{ github.sha }}' '${{ github.sha }}'
          EOF
